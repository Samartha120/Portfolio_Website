<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0f"/>
      <stop offset="1" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="300" cy="200" r="260" fill="#22c55e" fill-opacity="0.16"/>
  <circle cx="1340" cy="780" r="320" fill="#7c3aed" fill-opacity="0.12"/>

  <rect x="120" y="120" width="1360" height="660" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.10"/>

  <rect x="180" y="190" width="620" height="16" rx="8" fill="#ffffff" fill-opacity="0.18"/>
  <rect x="180" y="235" width="420" height="12" rx="6" fill="#ffffff" fill-opacity="0.10"/>

  <!-- chart blocks -->
  <rect x="180" y="300" width="600" height="200" rx="18" fill="#000000" fill-opacity="0.22" stroke="#ffffff" stroke-opacity="0.10"/>
  <rect x="820" y="300" width="600" height="200" rx="18" fill="#000000" fill-opacity="0.22" stroke="#ffffff" stroke-opacity="0.10"/>
  <rect x="180" y="530" width="1240" height="170" rx="18" fill="#000000" fill-opacity="0.22" stroke="#ffffff" stroke-opacity="0.10"/>

  <!-- mini bars -->
  <rect x="230" y="360" width="220" height="10" rx="5" fill="#ffffff" fill-opacity="0.14"/>
  <rect x="230" y="390" width="320" height="10" rx="5" fill="#ffffff" fill-opacity="0.14"/>
  <rect x="230" y="420" width="180" height="10" rx="5" fill="#ffffff" fill-opacity="0.14"/>

  <rect x="870" y="360" width="260" height="10" rx="5" fill="#ffffff" fill-opacity="0.14"/>
  <rect x="870" y="390" width="180" height="10" rx="5" fill="#ffffff" fill-opacity="0.14"/>
  <rect x="870" y="420" width="340" height="10" rx="5" fill="#ffffff" fill-opacity="0.14"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#ffffff">
    <text x="800" y="820" text-anchor="middle" font-size="26" fill-opacity="0.85">
      Replace with your responses summary screenshot
    </text>
    <text x="800" y="852" text-anchor="middle" font-size="16" fill-opacity="0.55">
      public/assets/images/case-study/responses-summary-proof.svg
    </text>
  </g>
</svg>
