<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0f"/>
      <stop offset="1" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1280" cy="160" r="260" fill="#7c3aed" fill-opacity="0.18"/>
  <circle cx="320" cy="820" r="320" fill="#22c55e" fill-opacity="0.10"/>

  <rect x="120" y="120" width="1360" height="660" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.10"/>
  <rect x="180" y="190" width="520" height="18" rx="9" fill="#ffffff" fill-opacity="0.20"/>
  <rect x="180" y="230" width="380" height="12" rx="6" fill="#ffffff" fill-opacity="0.10"/>

  <rect x="180" y="310" width="1240" height="72" rx="18" fill="#000000" fill-opacity="0.25" stroke="#ffffff" stroke-opacity="0.10"/>
  <rect x="180" y="410" width="1240" height="72" rx="18" fill="#000000" fill-opacity="0.25" stroke="#ffffff" stroke-opacity="0.10"/>
  <rect x="180" y="510" width="1240" height="140" rx="18" fill="#000000" fill-opacity="0.25" stroke="#ffffff" stroke-opacity="0.10"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#ffffff">
    <text x="800" y="820" text-anchor="middle" font-size="26" fill-opacity="0.85">
      Replace with your Google Form screenshot
    </text>
    <text x="800" y="852" text-anchor="middle" font-size="16" fill-opacity="0.55">
